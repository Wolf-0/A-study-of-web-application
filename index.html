<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz</title>
    <script>
    let Q = [
    'Q.日本で一番高い山は？',
    ' onclick="Q_(1);" >富士山',
    ' onclick="Q_(2);" >北岳', 
    ' onclick="Q_(2);" >奥穂高岳', 
    '日本で一番高い山は富士山。なんと3,776Mもあります。',

    'Q.アメリカ合衆国の首都はどこでしょう？', 
    ' onclick="Q_(1);" >ワシントンDC',
    ' onclick="Q_(2);" >ニューヨーク',
    ' onclick="Q_(2);" >ロサンゼルス',
    '常識といえば常識ですが、意外と間違いやすいのがこのクイズ。<br/>正解はワシントンDC。ニューヨークではりませんよ。',

    'Q.世界三大珍味は何？', 
    ' onclick="Q_(2);" >うに、からすみ、このわた',
    ' onclick="Q_(2);" >すし、らーめん、てんぷら',
    ' onclick="Q_(1);" >フォアグラ、キャビア、トリュフ',
    '世界三大珍味は一般的にキャビア・フォアグラ・トリュフと言われています。',

    'Q.次のうち、イタリアにないものなーんだ？', 
    ' onclick="Q_(2);" >ピザ',
    ' onclick="Q_(2);" >アクアパッツァ',
    ' onclick="Q_(1);" >ナポリタン',
    '正解はナポリタン。ナポリにナポリタンはありません！',

    'Q.日本で初めてノーベル賞を取った人は誰でしょう？', 
    ' onclick="Q_(2);" >川端康成',
    ' onclick="Q_(1);" >湯川秀樹',
    ' onclick="Q_(2);" >佐藤栄作',
    '日本初のノーベル賞を受賞したのは湯川秀樹さん。',

    'Q.ハロウィンで子供がお菓子を貰うお馴染みのセリフはなーんだ？', 
    ' onclick="Q_(2);" >ハッピーハロウィーン',
    ' onclick="Q_(1);" >トリック・オア・トリート ',
    ' onclick="Q_(2);" >メリークリスマス',
    '「お菓子をくれなきゃイタズラするよ」でおなじみのこのフレーズ。<br/>ハロウィーンは、もともと古代ケルト民族でのサウィン祭りが起源といわれています。'
];
    let r_1 = Q.length / 5;//クイズを出すための変数
    let r_2 = Math.floor( Math.random() * r_1 ) ;
    let R = (r_2 * 5) ;//クイズを出すための変数


//次の問題を表示するためのプログラムです
function Q_(oxq) {

	if (oxq === 0){
	
	 r_1 = Q.length / 5;
	 r_2 = Math.floor( Math.random() * r_1 );
	 R = (r_2 * 5);

 	 document.getElementById("ox").innerHTML = '';
	 document.getElementById("quiz").innerHTML = '';

	 quiz = document.getElementById('quiz');
	 quiz.insertAdjacentHTML('afterbegin', '<p>'+Q[R]+'</p>');
	 quiz.insertAdjacentHTML('beforeend', '<button class="option"'+Q[R+1]+'</button><span></span><br/>');
	 quiz.insertAdjacentHTML('beforeend', '<button class="option"'+Q[R+2]+'</button><span></span><br/>');
	 quiz.insertAdjacentHTML('beforeend', '<button class="option"'+Q[R+3]+'</button><span></span><br/>');

	} else if (oxq === 1) {//正解時の実行プログラムです
 	 document.getElementById("ox").innerHTML = '<p class="Correct">正解！</p>';
	 document.getElementById("quiz").innerHTML = '<p>'+Q[R+4]+'</p>';
 	 document.getElementById("next").innerHTML = '<p><button class="next" onClick="Q_(0);">次の問題へ</button></p>';

	} else if (oxq === 2) {//失敗時の実行プログラムです
 	 document.getElementById("ox").innerHTML = '<p class="Incorrect">不正解！</p>';
	 document.getElementById("quiz").innerHTML = '<p>'+Q[R+4]+'</p>';
 	 document.getElementById("next").innerHTML = '<p><button class="next" onClick="Q_(0);">次の問題へ</button></p>';
	}
}
function keypress_ivent(e) {
    if (e.key === 'a' || e.key === 'A') {
        Q_(0);
    }
}
</script>
    <style>
    body {
        background-color: #269;
        background-image:
        linear-gradient(rgba(255,255,255,.5) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,.5) 2px, transparent 2px),
        linear-gradient(rgba(255,255,255,.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.28) 1px, transparent 1px);
        background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
        background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
    }
    .quiz {
        font-size: 30px;
        color: #fff;
        text-align: center;
    }
    .title {
        font-size: 50px;
        color: #fff;
    }
    .option {
        display: inline-block;
        width: 500px;
        height: 60px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 4px;
        margin: 10px 0px 10px 0px;
        color: #ffffff;
        background-image: linear-gradient(#6795fd 0%, #67ceff 100%);
        box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.29);
        border-bottom: solid 3px #5e7fca;
    }
    .Correct {
        font-size: 40px;
        font-weight: bold;
        color: #0f0;
        text-align: center;
    }
    .Incorrect {
        font-size: 40px;
        font-weight: bold;
        color: #f00;
        text-align: center;
    }
    .span{
        margin-top: 10px;
    }
    .next {
        display: inline-block;
        width: 200px;
        height: 50px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 4px;
        margin: 10px 0px 10px 0px;
        color: #ffffff;
        background-image: linear-gradient(#6795fd 0%, #67ceff 100%);
        box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.29);
        border-bottom: solid 3px #5e7fca;
        text-align: center;
    }
    .footer {
        background-color: #666;
        height: 60px;
        color: #fff;
        position: fixed; /* ビューポートに対して固定 */
        bottom: 0;       /* 下端に配置 */
        left: 0;         /* 左端に揃える */
        width: 100%;  
        font-size: 20px;
        align-items: center;
        align-content: center;
        text-align: center;
    }
    </style>
</head>
<body>
    <h1 class="title">Quiz</h1>
    <script>
        document.addEventListener('keypress', keypress_ivent);
        document.write('<p id="ox"></p>');
        document.write('<p id="quiz" class="quiz">');
        document.write(Q[R+0] +'<br/>');
        document.write('<button class="option"'+ Q[R+1] +'</button><span></span><br/>');
        document.write('<button class="option"'+ Q[R+2] +'</button><span></span><br/>');
        document.write('<button class="option"'+ Q[R+3] +'</button><span></span><br/>');
        document.write('</p>');
        document.write('<p id="next"><button class="next" onClick="Q_(0);">次の問題へ</button></p>');
    </script>

    <footer class="footer">
        &copy; Ultra. All Rights Reserved.
    </footer>
</body>
</html>
