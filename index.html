<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">

    <title>得点管理画面 | NEP LEAGUE</title>
</head>
<body>
    <div class="select-score-wrapper">
        <h1 class="title">
            [SCR04] 得点管理 / Score Management
        </h1>
        <select name="score" id="select-score" class="select-score">
            <option value="" disabled selected>得点を入力</option>
            <option value="1">1点</option>
            <option value="2">2点</option>
            <option value="3">3点</option>
            <option value="4">4点</option>
            <option value="5">5点</option>
        </select>
        <span class="score_error hidden" id="score_error">得点が入力されていません</span>
    </div>
    <div class="tab" id ="js-tab">
        <div class="tab-nav">
            <a href="" class="tab-nav-item" data-nav="0">1人目</a>
            <a href="" class="tab-nav-item" data-nav="1">2人目</a>
            <a href="" class="tab-nav-item" data-nav="2">3人目</a>
            <a href="" class="tab-nav-item" data-nav="3">4人目</a>
        </div>
        <div class="tab-c">
            <div class="tab-c-item 0" data-content="0">
                <h3>1人目の学年とクラスを選択してください</h3>
                <div class="select-grade">
                    学年
                    <input type="radio" class="radio" name="1-grade" id="grade1-1">
                    <label class="label" for="grade1-1">1</label>
                    <input type="radio" class="radio" name="1-grade" id="grade1-2">
                    <label class="label" for="grade1-2">2</label>
                    <input type="radio" class="radio" name="1-grade" id="grade1-3">
                    <label class="label" for="grade1-3">3</label>
                </div>
                <div class="select-classroom">
                    クラス
                    <input type="radio" class="radio" name="1-class" id="class1-1">
                    <label class="label" for="class1-1">1</label>
                    <input type="radio" class="radio" name="1-class" id="class1-2">
                    <label class="label" for="class1-2">2</label>
                    <input type="radio" class="radio" name="1-class" id="class1-3">
                    <label class="label" for="class1-3">3</label>
                    <input type="radio" class="radio" name="1-class" id="class1-4">
                    <label class="label" for="class1-4">4</label>
                    <input type="radio" class="radio" name="1-class" id="class1-5">
                    <label class="label" for="class1-5">5</label>
                    <input type="radio" class="radio" name="1-class" id="class1-6">
                    <label class="label" for="class1-6">6</label>
                    <input type="radio" class="radio" name="1-class" id="class1-7">
                    <label class="label" for="class1-7">7</label>
                    <input type="radio" class="radio" name="1-class" id="class1-8">
                    <label class="label" for="class1-8">8</label>
                </div>
            </div>
            <div class="tab-c-item 1" data-content="1">
                <h3>2人目の学年とクラスを選択してください</h3>
                <div class="select-grade">
                    学年
                    <input type="radio" class="radio" name="2-grade" id="grade2-1">
                    <label class="label" for="grade2-1">1</label>
                    <input type="radio" class="radio" name="2-grade" id="grade2-2">
                    <label class="label" for="grade2-2">2</label>
                    <input type="radio" class="radio" name="2-grade" id="grade2-3">
                    <label class="label" for="grade2-3">3</label>
                </div>
                <div class="select-classroom">
                    クラス
                    <input type="radio" class="radio" name="2-class" id="class2-1">
                    <label class="label" for="class2-1">1</label>
                    <input type="radio" class="radio" name="2-class" id="class2-2">
                    <label class="label" for="class2-2">2</label>
                    <input type="radio" class="radio" name="2-class" id="class2-3">
                    <label class="label" for="class2-3">3</label>
                    <input type="radio" class="radio" name="2-class" id="class2-4">
                    <label class="label" for="class2-4">4</label>
                    <input type="radio" class="radio" name="2-class" id="class2-5">
                    <label class="label" for="class2-5">5</label>
                    <input type="radio" class="radio" name="2-class" id="class2-6">
                    <label class="label" for="class2-6">6</label>
                    <input type="radio" class="radio" name="2-class" id="class2-7">
                    <label class="label" for="class2-7">7</label>
                    <input type="radio" class="radio" name="2-class" id="class2-8">
                    <label class="label" for="class2-8">8</label>
                </div>
            </div>
            <div class="tab-c-item 2" data-content="2">
                <h3>3人目の学年とクラスを選択してください</h3>
                <div class="select-grade">
                    学年
                    <input type="radio" class="radio" name="3-grade" id="grade3-1">
                    <label class="label" for="grade3-1">1</label>
                    <input type="radio" class="radio" name="3-grade" id="grade3-2">
                    <label class="label" for="grade3-2">2</label>
                    <input type="radio" class="radio" name="3-grade" id="grade3-3">
                    <label class="label" for="grade3-3">3</label>
                </div>
                <div class="select-classroom">
                    クラス
                    <input type="radio" class="radio" name="3-class" id="class3-1">
                    <label class="label" for="class3-1">1</label>
                    <input type="radio" class="radio" name="3-class" id="class3-2">
                    <label class="label" for="class3-2">2</label>
                    <input type="radio" class="radio" name="3-class" id="class3-3">
                    <label class="label" for="class3-3">3</label>
                    <input type="radio" class="radio" name="3-class" id="class3-4">
                    <label class="label" for="class3-4">4</label>
                    <input type="radio" class="radio" name="3-class" id="class3-5">
                    <label class="label" for="class3-5">5</label>
                    <input type="radio" class="radio" name="3-class" id="class3-6">
                    <label class="label" for="class3-6">6</label>
                    <input type="radio" class="radio" name="3-class" id="class3-7">
                    <label class="label" for="class3-7">7</label>
                    <input type="radio" class="radio" name="3-class" id="class3-8">
                    <label class="label" for="class3-8">8</label>
                </div>
            </div>
            <div class="tab-c-item 3" data-content="3">
                <h3>4人目の学年とクラスを選択してください</h3>
                <div class="select-grade">
                    学年
                    <input type="radio" class="radio" name="4-grade" id="grade4-1">
                    <label class="label" for="grade4-1">1</label>
                    <input type="radio" class="radio" name="4-grade" id="grade4-2">
                    <label class="label" for="grade4-2">2</label>
                    <input type="radio" class="radio" name="4-grade" id="grade4-3">
                    <label class="label" for="grade4-3">3</label>
                </div>
                <div class="select-classroom">
                    クラス
                    <input type="radio" class="radio" name="4-class" id="class4-1">
                    <label class="label" for="class4-1">1</label>
                    <input type="radio" class="radio" name="4-class" id="class4-2">
                    <label class="label" for="class4-2">2</label>
                    <input type="radio" class="radio" name="4-class" id="class4-3">
                    <label class="label" for="class4-3">3</label>
                    <input type="radio" class="radio" name="4-class" id="class4-4">
                    <label class="label" for="class4-4">4</label>
                    <input type="radio" class="radio" name="4-class" id="class4-5">
                    <label class="label" for="class4-5">5</label>
                    <input type="radio" class="radio" name="4-class" id="class4-6">
                    <label class="label" for="class4-6">6</label>
                    <input type="radio" class="radio" name="4-class" id="class4-7">
                    <label class="label" for="class4-7">7</label>
                    <input type="radio" class="radio" name="4-class" id="class4-8">
                    <label class="label" for="class4-8">8</label>
                </div>
            </div>
        </div>
        <div class="submit-btn-wrapper">
            <button class="submit-btn" id="js-submit-btn">送信</button>
        </div>
    </div>
    <script src="./assets/js/index.js"></script>
</body>
</html>
